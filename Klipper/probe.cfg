[probe]
pin: ^gpio25
x_offset: 0
y_offset: 11.5
speed: 3.0
lift_speed: 5.0
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.02
samples_tolerance_retries: 2

[bed_mesh]
speed: 50
horizontal_move_z: 5
mesh_min: 20, 15
mesh_max: 100, 68
algorithm: bicubic
probe_count: 3,3
fade_start: 1
fade_end: 10

[screws_tilt_adjust]
screw1: 60, 58.5
screw1_name: rear center screw
screw2: 105, 0.5
screw2_name: front right screw
screw3: 15, 0.5
screw3_name: front left screw

horizontal_move_z: 5
speed: 100
screw_thread: CW-M3