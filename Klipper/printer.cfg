[include mainsail.cfg]

[mcu]
serial: /dev/ttyS0
restart_method: command

[virtual_sdcard]
path: /home/cbata/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 6.0

[idle_timeout]
timeout: 1800

#####################################
#              STEPPER              #
#####################################
[include stepper.cfg]

[extruder]
#control: pid         # Do PID calibration after initial checks
#pid_Kp: 29.472
#pid_Ki: 7.557
#pid_Kd: 28.735

#####################################
#              Probe             #
#####################################
[include probe.cfg]

[probe]
#z_offset: 1.730  # Do PROBE_CALIBRATE

#####################################
#              Sensor             #
#####################################
#[include sensor.cfg]

#####################################
#               BED                 #
#####################################
[include bed.cfg]

[heater_bed]
control: pid  # Do PID calibration after initial checks
pid_kp: 47.672
pid_ki: 3.924
pid_kd: 144.803

#####################################
#               FAN                 #
#####################################
[heater_fan hotend_fan]
pin: gpio17
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[multi_pin my_fan]
pins: gpio18, gpio20

[fan]
pin: multi_pin:my_fan


#####################################################################
# OLED
#####################################################################
[include oled.cfg]

#####################################################################
# Neopixel
#####################################################################

[neopixel board_rgb]
pin: gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.1
initial_BLUE: 0.0

#####################################
#              MACROS               #
#####################################
[include macros/*.cfg]

