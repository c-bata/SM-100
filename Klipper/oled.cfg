[mcu host]
serial: /tmp/klipper_host_mcu

[display]
lcd_type: ssd1306
menu_timeout: 30
i2c_mcu: host
i2c_bus: i2c.1
i2c_address: 60 #(0x3c) 

encoder_pins: host:gpio17, host:gpio22
click_pin: ^!host:gpio27

[menu __main __octoprint]
type: disabled

[menu __main __setup __calib]
type: list
name: Calibration

[menu __main __setup __calib __delta_calib_auto]
type: disabled

[menu __main __setup __calib __delta_calib_man]
type: disabled

[menu __main __setup __calib __bed_screw_adjust]
type: list
enable: {not printer.idle_timeout.state == "Printing"}
name: Bed Screw Adjust
index: 1

[menu __main __setup __calib __bed_screw_adjust __home]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
name: Home All
gcode: G28

[menu __main __setup __calib __bed_screw_adjust __start]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
name: Start BedScrewAdjust
gcode:
    BED_SCREWS_ADJUST

[menu __main __setup __calib __bed_screw_adjust __adjusted]
type: command
name: Adjusted
gcode:
    ADJUSTED

[menu __main __setup __calib __bed_screw_adjust __abort]
type: command
name: Abort
gcode:
    ABORT

[menu __main __temp __preheat_pla+]
type: list
name: Preheat PLA+
index: 4

[menu __main __temp __preheat_pla+ __all]
type: command
enable: {('extruder' in printer) and ('heater_bed' in printer)}
name: Preheat all
gcode:
    M140 S70
    M104 S220

[menu __main __temp __preheat_pla+ __hotend]
type: command
enable: {'extruder' in printer}
name: Preheat hotend
gcode: M104 S220

[menu __main __temp __preheat_pla+ __hotbed]
type: command
enable: {'heater_bed' in printer}
name: Preheat hotbed
gcode: M140 S70
